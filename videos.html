<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Davidas Design Concepts — Video library. Watch our jewelry design, CAD, repair, engraving, wax carving, and digitizing videos.">
  <title>Video Library | Davidas Design Concepts — Greensboro, NC</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/includes.js"></script>
</head>
<body>
  <div id="site-nav"></div>

  <!-- Page Header -->
  <header class="category-header reveal">
    <div class="container">
      <h1 class="section__title">Video Library</h1>
    </div>
  </header>

  <!-- Video Grid -->
  <section class="section reveal">
    <div class="container">
      <div class="video-grid" data-stagger>
        <article class="video-card" data-video-src="/video-files/Cad-new.mp4" data-video-title="CAD Design">
          <div class="video-card__thumb">
            <img src="images/Video_Thumbs/CAD.png" alt="CAD Design video thumbnail">
            <div class="video-card__play" aria-hidden="true"></div>
          </div>
          <div class="video-card__body">
            <h3 class="video-card__title">CAD Design</h3>
            <p class="video-card__desc">Designing a ring on computer</p>
          </div>
        </article>
        <article class="video-card" data-video-src="/video-files/Jewelry-Repair-new.mp4" data-video-title="Jewelry Repair">
          <div class="video-card__thumb">
            <img src="images/Video_Thumbs/Jewelry%20Repair.png" alt="Jewelry Repair video thumbnail">
            <div class="video-card__play" aria-hidden="true"></div>
          </div>
          <div class="video-card__body">
            <h3 class="video-card__title">Jewelry Repair</h3>
            <p class="video-card__desc">Expert repair techniques</p>
          </div>
        </article>
        <article class="video-card" data-video-src="/video-files/Laser-Engraving.mp4" data-video-title="Laser Engraving">
          <div class="video-card__thumb">
            <img src="images/Video_Thumbs/Laser%20Engraving.jpg" alt="Laser Engraving video thumbnail">
            <div class="video-card__play" aria-hidden="true"></div>
          </div>
          <div class="video-card__body">
            <h3 class="video-card__title">Laser Engraving</h3>
            <p class="video-card__desc">Precision laser engraving</p>
          </div>
        </article>
        <article class="video-card" data-video-src="/video-files/5-Axis-Milling.mp4" data-video-title="5 Axis Milling">
          <div class="video-card__thumb">
            <img src="images/Video_Thumbs/5%20Axis.jpg" alt="5 Axis Milling video thumbnail">
            <div class="video-card__play" aria-hidden="true"></div>
          </div>
          <div class="video-card__body">
            <h3 class="video-card__title">5 Axis Milling</h3>
            <p class="video-card__desc">5 axis milling process</p>
          </div>
        </article>
        <article class="video-card" data-video-src="/video-files/Wax-Carving-new.mp4" data-video-title="Wax Carving">
          <div class="video-card__thumb">
            <img src="images/Video_Thumbs/Wax%20Carving.jpg" alt="Wax Carving video thumbnail">
            <div class="video-card__play" aria-hidden="true"></div>
          </div>
          <div class="video-card__body">
            <h3 class="video-card__title">Wax Carving</h3>
            <p class="video-card__desc">Hand-carved wax models</p>
          </div>
        </article>
        <article class="video-card" data-video-src="/video-files/Digitizing-new.mp4" data-video-title="Digitizing">
          <div class="video-card__thumb">
            <img src="images/Video_Thumbs/Digitizing.jpg" alt="Digitizing video thumbnail">
            <div class="video-card__play" aria-hidden="true"></div>
          </div>
          <div class="video-card__body">
            <h3 class="video-card__title">Digitizing</h3>
            <p class="video-card__desc">Logo digitizing process</p>
          </div>
        </article>
      </div>
    </div>
  </section>

  <!-- Video Player Modal -->
  <div class="modal-overlay" id="video-modal" style="display:none;">
    <div class="modal modal--video">
      <button class="modal__close" id="video-modal-close" aria-label="Close">&times;</button>
      <h3 class="modal__title" id="video-modal-title"></h3>
      <video id="video-player" controls preload="metadata" playsinline>
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="js/main.js"></script>
</body>
</html>
