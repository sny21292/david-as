<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse our handcrafted jewelry collection — Ladies, Cross Pendants, Wedding, Gents, and Specialty pieces from Davidas Design Concepts.">
  <title>Jewelry Collection | Davidas Design Concepts</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/includes.js"></script>
</head>
<body>
  <div id="site-nav"></div>

  <main class="section">
    <div class="container">

      <!-- Breadcrumb -->
      <nav class="breadcrumb" id="breadcrumb">
        <a href="#" data-nav="home">Jewelry</a>
      </nav>

      <!-- VIEW 1: Category Menu -->
      <div id="view-categories" class="jewelry-view">
        <div class="section__header">
          <span class="section__tag">Browse Collection</span>
          <h1 class="section__title">Our Jewelry</h1>
        </div>
        <div class="cat-layout">
          <div class="cat-menu" id="cat-menu"></div>
          <div class="cat-procurement">
            <h3 class="cat-procurement__title">Jewelry Procurement</h3>
            <p class="cat-procurement__text" id="procurement-text"></p>
          </div>
        </div>
      </div>

      <!-- VIEW 2: Product Grid -->
      <div id="view-grid" class="jewelry-view" style="display:none;">
        <div class="section__header">
          <p class="section__desc">Click image for more information</p>
        </div>
        <div class="jewelry-grid" id="product-grid"></div>
      </div>

      <!-- VIEW 3: Product Detail -->
      <div id="view-detail" class="jewelry-view" style="display:none;">
        <div class="product-detail" id="product-detail"></div>
      </div>

    </div>
  </main>

  <!-- Inquiry Modal -->
  <div class="modal-overlay" id="inquiry-modal" style="display:none;">
    <div class="modal">
      <button class="modal__close" id="modal-close" aria-label="Close">&times;</button>
      <h2 class="modal__title">Pricing Inquiry</h2>
      <p class="modal__subtitle">Style #<span id="modal-style"></span></p>
      <form class="inquiry-form" id="inquiry-form">
        <div class="inquiry-form__row">
          <div class="inquiry-form__field">
            <label for="inq-fname">First Name *</label>
            <input type="text" id="inq-fname" name="fname" required>
          </div>
          <div class="inquiry-form__field">
            <label for="inq-lname">Last Name *</label>
            <input type="text" id="inq-lname" name="lname" required>
          </div>
        </div>
        <div class="inquiry-form__field">
          <label for="inq-email">Email Address *</label>
          <input type="email" id="inq-email" name="email" required>
        </div>
        <div class="inquiry-form__field">
          <label for="inq-style">Style #</label>
          <input type="text" id="inq-style" name="style" readonly>
        </div>
        <div class="inquiry-form__field">
          <label for="inq-message">Tell us any changes you want made:</label>
          <p class="inquiry-form__hint" id="inq-hint">Metal, Karat &amp; Color, and if you have stones or stone choice</p>
          <textarea id="inq-message" name="message" rows="5"></textarea>
        </div>
        <div class="inquiry-form__actions">
          <button type="submit" class="btn btn--primary">Submit</button>
          <button type="reset" class="btn btn--outline">Reset</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 3D Viewer Modal -->
  <div class="modal-overlay" id="viewer-modal" style="display:none;">
    <div class="modal modal--viewer">
      <button class="modal__close" id="viewer-close" aria-label="Close">&times;</button>
      <iframe id="viewer-iframe" src="" allow="autoplay" allowfullscreen></iframe>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="js/products.js"></script>
  <script src="js/main.js"></script>
  <script src="js/jewelry.js"></script>
</body>
</html>
